services:
  - type: web
    name: ev-portal-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ev-portal-sigma.vercel.app

databases:
  - name: ev-portal-db
    databaseName: ev_portal
    user: ev_user
    plan: free
